"en:iron":
  content: |-
    Le fer est un minéral qui contribue notamment au transport de l'oxygène dans l'organisme. Une carence en fer peut entraîner une anémie, de la fatigue et un ralentissement des fonctions corporelles. Les viandes maigres, la volaille, le poisson, les légumineuses et les légumes verts à feuilles foncées sont de bonnes sources de fer. Les associer à des aliments riches en vitamine C favorise l'absorption du fer par l'organisme.
