"en:pegi_3":
  content: |-
    - ***Description du contenu :*** Ce contenu est considéré comme adapté à tous les publics.
    - ***Caractéristiques principales :***
    - **Violence :** Seules des formes très légères de violence sont acceptables, généralement dans un contexte comique, caricatural ou enfantin (par exemple, gags burlesques, violence suggérée, réactions non réalistes).
    - **Peur :** Aucun son ni image susceptible d'effrayer les jeunes enfants.
    - **Langage :** Aucun langage grossier ne doit être utilisé.
    - **Autres :** Aucun contenu sexuel, drogue ou jeu d'argent.
    - ***Implication :*** Cette classification vise à garantir que le contenu est sûr et non perturbant pour les plus jeunes publics.
    - ***Sources :*** [Site officiel PEGI](https://pegi.info/what-do-the-labels-mean), [Uswitch - Guide des parents sur les classifications PEGI](https://www.uswitch.com/broadband/studies/parents-guide-to-gaming/)
"en:pegi_7":
  content: |-
    - ***Description du contenu :*** Ce contenu convient aux enfants de 7 ans et plus.
    - ***Caractéristiques principales :***
    - **Violence :** Des formes très légères de violence sont acceptables. Il peut s’agir de violence suggérée, non détaillée ou non réaliste, souvent dirigée contre des personnages fantastiques. Des violences très légères et non réalistes envers des personnages humanoïdes peuvent également être présentes.
    - **Peur :** Les jeux comportant des scènes ou des sons susceptibles d’effrayer les jeunes enfants (par exemple, une atmosphère angoissante, des sons ou des images effrayants) entrent dans cette catégorie.
    - **Langage :** Aucun langage grossier, ou seulement des jurons très légers et non sexuels.
    - **Autres :** Aucun contenu sexuel explicite, drogue ou jeu d’argent.
    - ***Implication :*** Contient des éléments qui pourraient être trop intenses pour les très jeunes enfants, notamment en termes de peur et de violence fantastique légèrement plus prononcée.
    - ***Sources :*** [Site officiel PEGI](https://pegi.info/what-do-the-labels-mean), [Uswitch - Guide des parents sur les classifications PEGI](https://www.uswitch.com/broadband/studies/parents-guide-to-gaming/)
"en:pegi_12":
  content: |-
    - ***Description du contenu :*** Ce contenu convient aux personnes de 12 ans et plus.
    - ***Caractéristiques principales :***
    - **Violence :** Violence plus graphique ou réaliste envers des personnages fantastiques, ou violence non réaliste envers des personnages humanoïdes. Cela peut inclure des impacts plus visibles, mais généralement sans effusion de sang. La violence suggérée envers les humains, lorsque la violence n'est pas montrée explicitement, est également abordée.
    - **Peur/Horreur :** Menace, angoisse ou descriptions de blessures plus explicites, et séquences d'horreur plus longues ou images perturbantes.
    - **Langage :** Langage grossier et/ou offensant léger (à l'exception des insultes à caractère sexuel).
    - **Sexualité :** Allusions ou postures sexuelles possibles. Nudité érotique ou rapports sexuels non explicites.
    - **Jeux d'argent :** Peut contenir des éléments encourageant ou enseignant les jeux d'argent (simulations de jeux de casino, etc.).
    - ***Implication :*** Marque une nette progression en termes de maturité, avec notamment une violence plus réaliste, des thèmes suggestifs et un langage légèrement grossier.
    - ***Sources :*** [Site web officiel PEGI](https://pegi.info/what-do-the-labels-mean), [Uswitch - Guide des classifications PEGI pour les parents](https://www.uswitch.com/broadband/studies/parents-guide-to-gaming/)
"en:pegi_16":
  content: |-
    - ***Description du contenu :*** Ce contenu est adapté aux personnes de 16 ans et plus.
    - ***Caractéristiques principales :***
    - **Violence :** Représentations de violence (ou d’activité sexuelle) d’un réalisme comparable à celui de la vie réelle. Cela peut inclure des violences réalistes envers des personnages humains, souvent avec des représentations de mort et de blessures. Des scènes sanglantes ou gores peuvent être présentes dans les jeux de type arcade.
    - **Langage :** Langage grossier extrême, incluant des injures à caractère sexuel ou des blasphèmes.
    - **Drogues :** Peut inclure l’incitation à la consommation de tabac ou d’alcool, ou des représentations de consommation de drogues illégales.
    - **Sexe :** Nudité érotique ou rapports sexuels sans organes génitaux visibles.
    - **Jeux d’argent :** Peut inclure des éléments encourageant ou enseignant les jeux d’argent.
    - ***Implication :*** Le contenu de ce niveau est considérablement plus mature et aborde souvent des thèmes réalistes et potentiellement perturbants.
    - ***Sources :*** [Site web officiel PEGI](https://pegi.info/what-do-the-labels-mean), [Uswitch - Guide des parents sur les classifications PEGI](https://www.uswitch.com/broadband/studies/parents-guide-to-gaming/)
"en:pegi_18":
  content: |-
    - ***Description du contenu :*** Ce contenu est réservé aux adultes.
    - ***Caractéristiques principales :***
    - **Violence :** Ce contenu est classé comme « violence extrême ». Cela inclut les méthodes horribles pour entraîner la mort ou des blessures graves, la torture, la décapitation, le démembrement, les meurtres gratuits ou les violences envers des personnages sans défense. Les violences et menaces sexuelles sont également classées ici.
    - **Drogues :** Représentations idéalisées de drogues illégales ou promotion importante de substances contrôlées.
    - **Sexe :** Scènes de sexe détaillées ou explicites, y compris la présence de parties génitales visibles.
    - **Jeux d'argent :** Simulations de jeux d'argent réalistes.
    - **Discrimination :** Ce contenu peut contenir des éléments qui encouragent ou enseignent la discrimination.
    - ***Implication :*** Il s'agit de la classification d'âge la plus élevée et elle indique un contenu strictement réservé à un public averti en raison de sa nature graphique et potentiellement perturbante.
    - ***Sources :*** [Site web officiel de PEGI](https://pegi.info/what-do-the-labels-mean), [Guide parental Uswitch sur les classifications PEGI](https://www.uswitch.com/broadband/studies/parents-guide-to-gaming/)
"en:pegi_violence":
  content: |-
    - ***Description :*** Ce descripteur indique que le jeu contient des scènes de violence.
    - ***Niveaux de gravité :***
    - **Doux/Dessin animé (PEGI 3/7) :** Violence très légère et non réaliste (par exemple, gags, blessures caricaturales ou violence suggérée) souvent dirigée contre des personnages fantastiques.
    - **Modéré (PEGI 12) :** Violence plus graphique ou réaliste envers des personnages fantastiques, ou violence irréaliste envers des personnages humanoïdes (par exemple, blessures mineures, pas de sang).
    - **Fort (PEGI 16) :** Violence réaliste envers des personnages humains, incluant des représentations de mort et de blessures. Des scènes sanglantes ou gores peuvent être présentes dans les jeux de type arcade.
    - **Déconseillé aux moins de 18 ans (PEGI 18) :** Méthodes horribles pour causer la mort ou des blessures graves, notamment la torture, la décapitation, le démembrement ou les violences gratuites contre des personnages vulnérables/innocents. Les violences et menaces sexuelles sont également classées dans cette catégorie.
    - ***Implication :*** Plus la classification PEGI associée est élevée, plus la violence représentée est intense et réaliste.
    - ***Sources :*** [Site web officiel du PEGI](https://pegi.info/what-do-the-labels-mean), [Autorité de classification des jeux](https://gamesratingauthority.org.uk/RatingBoard/ratings)
"en:pegi_bad_language":
  content: |-
    - ***Description :*** Ce descripteur indique que le jeu contient un langage grossier ou des jurons.
    - ***Niveaux de gravité :***
    - **Modéré (PEGI 12) :** Langage grossier et/ou vulgaire modéré, à l’exception des insultes à caractère sexuel (par exemple : « zut », « enfer », « merde »).
    - **Fort (PEGI 16/18) :** Insultes à caractère sexuel, blasphèmes ou langage extrêmement grossier.
    - ***Implication :*** La présence et l’intensité du langage grossier augmentent avec la classification PEGI.
    - ***Sources :*** [Site officiel PEGI](https://pegi.info/what-do-the-labels-mean), [Autorité de classification des jeux](https://gamesratingauthority.org.uk/RatingBoard/ratings)
"en:pegi_fear":
  content: |-
    - ***Description :*** Ce descripteur indique que le jeu contient des éléments susceptibles d'effrayer.
    - ***Niveaux de gravité :***
    - **Effrayant (PEGI 7) :** Images ou sons susceptibles d'effrayer les jeunes enfants (ex. : musique angoissante, environnements inquiétants, cris en arrière-plan). Ne comprend pas nécessairement de violence directe.
    - **Horreur (PEGI 12+) :** Menace, angoisse ou descriptions de blessures plus explicites, et séquences d'horreur ou images perturbantes plus longues.
    - ***Implication :*** L'accent est mis sur l'impact psychologique et le contenu perturbant, plutôt que sur la violence explicite.
    - ***Sources :*** [Site officiel de PEGI](https://pegi.info/what-do-the-labels-mean), [Autorité de classification des jeux](https://gamesratingauthority.org.uk/RatingBoard/ratings)
"en:pegi_gambling":
  content: |-
    - ***Description :*** Ce descripteur indique que le jeu contient des éléments qui encouragent ou enseignent les jeux de hasard.
    - ***Portée :*** Se réfère aux simulations de jeux de hasard traditionnels que l'on trouve généralement dans les casinos ou les salles de jeux (par exemple, les jeux de cartes joués en argent réel, les paris sur les courses).
    - ***Classification minimale :*** Ce descripteur apparaît uniquement sur les jeux classés **PEGI 12, 16 ou 18**. Depuis 2020, les jeux nouvellement classés avec des simulations de jeux de hasard réalistes sont toujours classés PEGI 18.
    - ***Remarque sur les loot boxes :*** La présence d'« objets aléatoires payants » (souvent appelés loot boxes) est un descripteur de contenu distinct (« Achats intégrés ») et peut se trouver dans des jeux avec des classifications d'âge inférieures (par exemple, PEGI 7).
    - ***Sources :*** [Site officiel de PEGI](https://pegi.info/what-do-the-labels-mean), [Autorité de classification des jeux](https://gamesratingauthority.org.uk/RatingBoard/ratings)
"en:pegi_sex":
  content: |-
    - ***Description :*** Ce descripteur indique la présence de contenu sexuel dans le jeu.
    - ***Niveaux de gravité :***
    - **Allusions/Positions suggestives (PEGI 12) :** Positations ou allusions sexuelles.
    - **Nudité érotique/Rapports sexuels non explicites (PEGI 16) :** Représentations de nudité érotique ou de rapports sexuels sans organes génitaux visibles.
    - **Activité sexuelle explicite (PEGI 18) :** Activité sexuelle détaillée ou explicite, incluant la visualisation des organes génitaux. Les violences et menaces sexuelles sont également incluses dans cette catégorie.
    - ***Implication :*** Le niveau d'explicite et de détail du contenu sexuel augmente avec la classification PEGI.
    - ***Sources :*** [Site officiel de PEGI](https://pegi.info/what-do-the-labels-mean), [Autorité de classification des jeux](https://gamesratingauthority.org.uk/RatingBoard/ratings)
"en:pegi_drugs":
  content: |-
    - ***Description :*** Ce descripteur indique que le jeu fait référence à la consommation de drogues illégales, d'alcool ou de tabac, ou la représente.
    - ***Niveaux de gravité :***
    - **Incitation/Représentation de la consommation (PEGI 16) :** Incitation à la consommation de tabac ou d'alcool (par exemple, un personnage en tire un avantage) ou représentations de la consommation de drogues illégales.
    - **Glamour/Promotion (PEGI 18) :** Représentations glorifiées des drogues illégales ou promotion explicite de substances contrôlées.
    - ***Classification minimale :*** Ce descripteur ne se trouve que sur les jeux classés **PEGI 16 ou PEGI 18**.
    - ***Sources :*** [Site web officiel du PEGI](https://pegi.info/what-do-the-labels-mean), [Autorité de classification des jeux](https://gamesratingauthority.org.uk/RatingBoard/ratings)
"en:pegi_discrimination":
  content: |-
    - ***Description :*** Ce descripteur indique que le jeu contient des représentations de stéréotypes ethniques, religieux, nationalistes ou autres susceptibles d'inciter à la haine.
    - ***Contexte :*** Cette classification est appliquée lorsque le jeu promeut ou glorifie la discrimination envers des groupes en raison de leur origine, religion, nationalité, sexe, orientation sexuelle ou autres caractéristiques.
    - ***Classification minimale :*** Ce descripteur apparaît généralement sur les jeux classés **PEGI 18**, en raison de la gravité de leur contenu.
    - ***Sources :*** [Site web officiel de PEGI](https://pegi.info/what-do-the-labels-mean), [Autorité de classification des jeux](https://gamesratingauthority.org.uk/RatingBoard/ratings)
"en:pegi_in_game_purchases":
  content: |-
    - ***Description :*** Ce descripteur indique que le jeu propose des achats numériques optionnels avec de l'argent réel.
    - ***Portée :*** Inclut différentes formes d'achats en jeu :
    - **Objets cosmétiques :** Skins, emotes, améliorations visuelles.
    - **Avantages de jeu :** Bonus, monnaie virtuelle, boosters.
    - **Extensions/DLC :** Contenu ou scénario supplémentaire.
    - **Objets aléatoires payants (Boîtes à butin) :** Les joueurs ne savent pas exactement ce qu'ils vont obtenir avant l'achat (ex. : paquets de cartes, caisses d'objets).
    - ***Remarque :*** Ce descripteur **n'est pas** une classification par âge, mais une icône informative. Il peut apparaître sur des jeux de toutes les classifications PEGI, y compris PEGI 3.
    - ***Préoccupations (surtout pour les enfants) :*** Risque de dépenses excessives, incitation à des comportements de type jeu d'argent avec des objets aléatoires et pression pour acheter afin de progresser.
    - ***Sources :*** [Site web officiel PEGI](https://pegi.info/what-do-the-labels-mean), [Parent Zone - Comprendre les classifications PEGI](https://parentzone.org.uk/article/pegi-games-ratings)
