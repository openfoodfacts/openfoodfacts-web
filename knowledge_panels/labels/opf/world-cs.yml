"en:pegi_3":
  content: |-
    - ***Co to je:*** Obsah je vhodný pro všechny věkové skupiny.
    - ***Hlavní charakteristiky:***
    - **Násilí:** Přípustné jsou pouze velmi mírné formy násilí, obvykle v komickém, kresleném nebo dětském prostředí (např. fackování, naznačované zranění, nerealistické reakce).
    - **Strach:** Žádné zvuky nebo obrázky, které by mohly vystrašit malé děti.
    - **Jazyk:** Nesmí být slyšet žádné sprosté slova.
    - **Ostatní:** Žádný sexuální obsah, drogy nebo hazardní hry.
    - ***Implikace:*** Toto hodnocení se zaměřuje na to, aby byl obsah bezpečný a neruší pro nejmladší publikum.
    - ***Zdroje:*** [Oficiální web PEGI](https://pegi.info/what-do-the-labels-mean), [Uswitch - Příručka pro rodiče o hodnocení PEGI](https://www.uswitch.com/broadband/studies/parents-guide-to-gaming/)
"en:pegi_7":
  content: |-
    - ***Co to je:*** Obsah je vhodný pro děti od 7 let.
    - ***Klíčové vlastnosti:***
    - **Násilí:** Jsou přijatelné velmi mírné formy násilí. Může se jednat o implicitní, nedetailní nebo nerealistické násilí, často namířené proti fantasy postavám. Může se objevit i velmi mírné nerealistické násilí páchané na lidských postavách.
    - **Strach:** Do této kategorie spadají hry se scénami nebo zvuky, které mohou být pro mladší děti děsivé (např. znepokojivá atmosféra, některé děsivé zvuky nebo obrázky).
    - **Jazyk:** Žádné vulgarismy nebo pouze velmi mírné, nesexuální nadávky.
    - **Ostatní:** Stále žádný explicitní sexuální obsah, drogy ani hazardní hry.
    - ***Důsledek:*** Zavádí prvky, které by mohly být pro velmi malé děti příliš intenzivní, zejména pokud jde o strach a mírně výraznější fantasy násilí.
    - ***Zdroje:*** [Oficiální webové stránky PEGI](https://pegi.info/what-do-the-labels-mean), [Uswitch - Průvodce pro rodiče hodnocením PEGI](https://www.uswitch.com/broadband/studies/parents-guide-to-gaming/)
"en:pegi_12":
  content: |-
    - ***Co to je:*** Obsah je vhodný pro osoby starší 12 let.
    - ***Klíčové charakteristiky:***
    - **Násilí:** Grafičtější nebo realističtější násilí páchané na fantasy postavách nebo nerealistické násilí páchané na lidských postavách. Může se jednat o viditelnější dopad, ale obecně bez krveprolití. Zahrnuto je i implicitní násilí páchané na lidech, kde skutečné násilí není zobrazeno.
    - **Strach/Hrůza:** Silnější výhružky, hrůza nebo grafické detaily zranění a déletrvající hororové sekvence nebo znepokojivé obrazy.
    - **Jazyk:** Mírné nadávky a/nebo urážlivý jazyk (bez sexuálních nadávek).
    - **Sex:** Mohou být přítomny sexuální narážky nebo sexuální pózy. Erotická nahota nebo neexplicitní pohlavní styk.
    - **Hazardní hry:** Může obsahovat prvky, které povzbuzují k hazardním hrám nebo k nim učí (simulace kasinových her atd.).
    - ***Důsledek:*** Znamená významný krok vpřed ve vyspělosti, včetně realističtějšího násilí, sugestivní témata a mírné vulgarity.
    - ***Zdroje:*** [Oficiální webové stránky PEGI](https://pegi.info/what-do-the-labels-mean), [Uswitch - Průvodce rodičů hodnocením PEGI](https://www.uswitch.com/broadband/studies/parents-guide-to-gaming/)
"en:pegi_16":
  content: |-
    - ***Co to je:*** Obsah je vhodný pro osoby od 16 let.
    - ***Hlavní charakteristiky:***
    - **Násilí:** Zobrazení násilí (nebo sexuální aktivity), které dosahuje stádia, které vypadá stejně, jako by se dalo očekávat v reálném životě. To může zahrnovat realistické násilí vůči lidským postavám, často se zobrazením smrti a zranění. Krvavé nebo krvavé násilí může být přítomno, pokud je v arkádovém stylu.
    - **Jazyk:** Extrémnější sprostá slova, včetně sexuálních nadávek nebo rouhání.
    - **Drogy:** Může zahrnovat podněcování k užívání tabáku nebo alkoholu, nebo zobrazení užívání ilegálních drog.
    - **Sex:** Erotická nahota nebo pohlavní styk bez viditelných genitálií.
    - **Hazardní hry:** Může zahrnovat prvky, které podněcují nebo učí hazardní hry.
    - ***Implikace:*** Obsah na této úrovni je podstatně zralejší a často zahrnuje realistická a potenciálně znepokojivá témata.
    - ***Zdroje:*** [PEGI Oficiální webové stránky](https://pegi.info/what-do-the-labels-mean), [Uswitch - Průvodce rodičů PEGI hodnoceními](https://www.uswitch.com/broadband/studies/parents-guide-to-gaming/)
"en:pegi_18":
  content: |-
    - ***Co to je:*** Obsah je vhodný pouze pro dospělé.
    - ***Klíčové charakteristiky:***
    - **Násilí:** Používá se, když úroveň násilí dosáhne úrovně „hrubého násilí“. Patří sem hrůzné metody vedoucí k usmrcení nebo těžkému zranění, mučení, stětí, rozřezání, bezdůvodné zabití nebo násilí páchané na bezbranných postavách. Sem patří také sexuální násilí a výhrůžky.
    - **Drogy:** Glamorizované zobrazení nelegálních drog nebo prominentní propagace kontrolovaných látek.
    - **Sex:** Detailní nebo explicitní sexuální aktivita, včetně viditelných genitálií.
    - **Hazardní hry:** Realistické simulace hazardních her.
    - **Diskriminace:** Může obsahovat prvky, které podněcují k diskriminaci nebo ji vyučují.
    - ***Důsledek:*** Toto je nejvyšší věkové omezení a označuje obsah, který je kvůli své vizuální a potenciálně rušivé povaze určen výhradně pro dospělé publikum.
    - ***Zdroje:*** [Oficiální webové stránky PEGI](https://pegi.info/what-do-the-labels-mean), [Uswitch - Průvodce pro rodiče hodnocením PEGI](https://www.uswitch.com/broadband/studies/parents-guide-to-gaming/)
"en:pegi_violence":
  content: |-
    - ***Co to je:*** Tento popis udává, že hra obsahuje znázornění násilí.
    - ***Stupně závažnosti:***
    - **Mírné/Kreslené (PEGI 3/7):** Velmi mírné, nerealistické násilí (např. slapstick, kreslené ublížení nebo naznačené násilí) často směrované na fantasy postavy.
    - **Střední (PEGI 12):** Grafičtější nebo realističtější násilí vůči fantasy postavám, nebo nerealistické násilí vůči lidským postavám (např. menší zranění, bez krve).
    - **Silné (PEGI 16):** Realistické násilí vůči lidským postavám, včetně znázornění smrti a zranění. Krvavé nebo kruté násilí může být přítomno, pokud je v arkádovém stylu.
    - **Hrubé (PEGI 18):** Hrozné způsoby přivodění smrti nebo těžkého zranění, včetně mučení, stětí, rozčtvrcení nebo nemotivovaného násilí vůči zranitelným/nevinným postavám. Sexuální násilí a hrozby jsou zde také klasifikovány.
    - ***Implikace:*** Čím vyšší je přidružené věkové hodnocení PEGI, tím intenzivnější a realističtější je znázorněné násilí.
    - ***Zdroje:*** [Oficiální web PEGI](https://pegi.info/what-do-the-labels-mean), [Games Rating Authority](https://gamesratingauthority.org.uk/RatingBoard/ratings)
"en:pegi_bad_language":
  content: |-
    - ***Co to je:*** Tento popis označuje, že hra obsahuje urážlivý jazyk nebo nadávky.
    - ***Úrovně závažnosti:***
    - **Mírná (PEGI 12):** Mírné nadávky a/nebo urážlivý jazyk, s výjimkou sexuálních nadávek (např. „sakra“, „peklo“, „blbost“).
    - **Silná (PEGI 16/18):** Sexuální nadávky, rouhání nebo vysoce urážlivý jazyk.
    - ***Důsledek:*** Přítomnost a intenzita vulgarismů se zvyšuje s vyšším věkovým hodnocením PEGI.
    - ***Zdroje:*** [Oficiální webové stránky PEGI](https://pegi.info/what-do-the-labels-mean), [Games Rating Authority](https://gamesratingauthority.org.uk/RatingBoard/ratings)
"en:pegi_fear":
  content: |-
    - ***Co to je:*** Tento popis označuje, že hra obsahuje prvky, které mohou být děsivé nebo strašidelné.
    - ***Úrovně závažnosti:***
    - **Děsivé (PEGI 7):** Obrázky nebo zvuky, které mohou být pro malé děti děsivé nebo strašidelné (např. strašidelná hudba, děsivé prostředí, křik na pozadí). Nemusí nutně zahrnovat přímé násilí.
    - **Horor (PEGI 12+):** Silnější detaily výhrůžky, hrůzy nebo grafického zranění a déletrvající hororové sekvence nebo znepokojivé obrazy.
    - ***Důsledky:*** Zaměřuje se na psychologický dopad a znepokojivý obsah spíše než na explicitní násilí.
    - ***Zdroje:*** [Oficiální webové stránky PEGI](https://pegi.info/what-do-the-labels-mean), [Games Rating Authority](https://gamesratingauthority.org.uk/RatingBoard/ratings)
"en:pegi_gambling":
  content: |-
    - ***Co to je:*** Tento popis označuje, že hra obsahuje prvky, které podporují hazardní hry nebo k nim učí.
    - ***Rozsah:*** Vztahuje se na simulace tradičních hazardních her, které se obvykle nacházejí v kasinech nebo hernách (např. karetní hry hrané o peníze, sázení na dostihy).
    - ***Minimální hodnocení:*** Tento popis se objevuje pouze u her s hodnocením **PEGI 12, 16 nebo 18**. Od roku 2020 jsou nově hodnocené hry s realistickými simulacemi hazardních her vždy označeny jako PEGI 18.
    - ***Poznámka k loot boxům:*** Přítomnost „placených náhodných položek“ (často označovaných jako loot boxy) je samostatný popis obsahu („nákupy ve hře“) a lze je nalézt i v hrách s nižším věkovým hodnocením (např. PEGI 7).
    - ***Zdroje:*** [Oficiální webové stránky PEGI](https://pegi.info/what-do-the-labels-mean), [Autorita pro hodnocení her](https://gamesratingauthority.org.uk/RatingBoard/ratings)
"en:pegi_sex":
  content: |-
    - ***Co to je:*** Tento popisovač označuje přítomnost sexuálního obsahu ve hře.
    - ***Stupně závažnosti:***
    - **Náznaky/Postoj (PEGI 12):** Sexuální dráždivost nebo náznaky.
    - **Erotická nahota/Nevýslovný styk (PEGI 16):** Zobrazení erotické nahoty nebo pohlavního styku bez viditelných genitálií.
    - **Výslovná sexuální aktivita (PEGI 18):** Podrobná nebo výslovná sexuální aktivita, včetně viditelných genitálií. Sexuální násilí a hrozby také spadají do této kategorie.
    - ***Implikace:*** Úroveň explicitnosti a detailů v sexuálním obsahu se zvyšuje s vyššími věkovými hodnoceními PEGI.
    - ***Zdroje:*** [PEGI Oficiální web](https://pegi.info/what-do-the-labels-mean), [Games Rating Authority](https://gamesratingauthority.org.uk/RatingBoard/ratings)
"en:pegi_drugs":
  content: |-
    - ***Co to je:*** Tento popis označuje, že hra odkazuje na užívání nelegálních drog, alkoholu nebo tabáku nebo je zobrazuje.
    - ***Úrovně závažnosti:***
    - **Podněcování/zobrazení užívání (PEGI 16):** Podněcování užívání tabáku nebo alkoholu (např. získání výhody postavou) nebo zobrazení užívání nelegálních drog.
    - **Glamorizace/propagace (PEGI 18):** Glamorizované zobrazení nelegálních drog nebo výrazná propagace kontrolovaných látek.
    - ***Minimální hodnocení:*** Tento popis se nachází pouze u her s hodnocením **PEGI 16 nebo PEGI 18**.
    - ***Zdroje:*** [Oficiální webové stránky PEGI](https://pegi.info/what-do-the-labels-mean), [Autorita pro hodnocení her](https://gamesratingauthority.org.uk/RatingBoard/ratings)
"en:pegi_discrimination":
  content: |-
    - ***Co to je:*** Tento popis označuje, že hra obsahuje zobrazení etnických, náboženských, nacionalistických nebo jiných stereotypů, které by mohly podněcovat nenávist.
    - ***Kontext:*** Toto hodnocení se použije, když hra propaguje nebo oslavuje diskriminaci skupin na základě původu, náboženství, národnosti, pohlaví, sexuality nebo jiných charakteristik.
    - ***Minimální hodnocení:*** Tento popis se obvykle objevuje u her s hodnocením **PEGI 18**, a to z důvodu závažné povahy takového obsahu.
    - ***Zdroje:*** [Oficiální webové stránky PEGI](https://pegi.info/what-do-the-labels-mean), [Games Rating Authority](https://gamesratingauthority.org.uk/RatingBoard/ratings)
"en:pegi_in_game_purchases":
  content: |-
    - ***Co to je:*** Tento popis označuje, že hra nabízí volitelné digitální nákupy za skutečné peníze.
    - ***Rozsah:*** Zahrnuje různé formy nákupů ve hře:
    - **Kosmetické předměty:** Vzhledy, emotikony, vizuální vylepšení.
    - **Výhody ve hře:** Posílení, měna, boostery.
    - **Rozšíření/DLC:** Další obsah nebo příběh.
    - **Placené náhodné předměty (Loot Boxes):** Kde hráči před nákupem přesně neví, co dostanou (např. balíčky karet, bedny s předměty).
    - ***Poznámka:*** Tento popis **není** věkovým hodnocením, ale informační ikonou. Může se objevit u her s jakýmkoli hodnocením PEGI, včetně PEGI 3.
    - ***Obavy (obzvláště u dětí):*** Potenciál pro nadměrné utrácení, podněcování hazardních chování s náhodnými předměty a tlak na nákup pro pokrok.
    - ***Zdroje:*** [Oficiální web PEGI](https://pegi.info/what-do-the-labels-mean), [Parent Zone - Porozumění hodnocení PEGI](https://parentzone.org.uk/article/pegi-games-ratings)
