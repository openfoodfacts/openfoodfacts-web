"en:pegi_3":
  content: |-
    - ***Was es ist:*** Der Inhalt ist für alle Altersgruppen geeignet.
    - ***Hauptmerkmale:***
    - **Gewalt:** Nur sehr milde Formen von Gewalt sind akzeptabel, üblicherweise in einem komischen, cartoonhaften oder kindlichen Kontext (z. B. Schlagstock, angedeutete Gewalt, unrealistische Reaktionen).
    - **Angst:** Keine Geräusche oder Bilder, die kleine Kinder erschrecken könnten.
    - **Sprache:** Es dürfen keine Schimpfwörter vorkommen.
    - **Sonstiges:** Keine sexuellen Inhalte, Drogen oder Glücksspiel.
    - ***Implikation:*** Diese Bewertung zielt darauf ab, sicherzustellen, dass der Inhalt für die jüngsten Zuschauer sicher und unbedenklich ist.
    - ***Quellen:*** [Offizielle PEGI-Website](https://pegi.info/what-do-the-labels-mean), [Uswitch - Elternratgeber zu PEGI-Bewertungen](https://www.uswitch.com/broadband/studies/parents-guide-to-gaming/)
"en:pegi_7":
  content: |-
    - ***Was es ist:*** Die Inhalte sind für Kinder ab 7 Jahren geeignet.
    - ***Hauptmerkmale:***
    - **Gewalt:** Sehr milde Formen von Gewalt sind akzeptabel. Dies kann angedeutete, nicht detailliert dargestellte oder unrealistische Gewalt sein, die sich oft gegen Fantasiefiguren richtet. Sehr milde, unrealistische Gewalt gegen menschenähnliche Charaktere kann ebenfalls vorkommen.
    - **Angst:** Spiele mit Szenen oder Geräuschen, die für jüngere Kinder möglicherweise beängstigend sein können (z. B. beunruhigende Atmosphäre, einige gruselige Geräusche oder Bilder), fallen in diese Kategorie.
    - **Sprache:** Keine Schimpfwörter oder nur sehr milde, nicht-sexuelle Flüche.
    - **Sonstiges:** Weiterhin keine expliziten sexuellen Inhalte, Drogen oder Glücksspiel.
    - ***Implikation:*** Enthält Elemente, die für sehr junge Kinder zu intensiv sein könnten, insbesondere im Hinblick auf Angst und etwas stärker ausgeprägte Fantasy-Gewalt.
    - ***Quellen:*** [Offizielle PEGI-Website](https://pegi.info/what-do-the-labels-mean), [Uswitch – Elternratgeber zu PEGI-Bewertungen](https://www.uswitch.com/broadband/studies/parents-guide-to-gaming/)
"en:pegi_12":
  content: |-
    - ***Was es ist:*** Der Inhalt ist für Personen ab 12 Jahren geeignet.
    - ***Hauptmerkmale:***
    - **Gewalt:** Grafischere oder realistischere Gewalt gegen Fantasy-Charaktere oder nicht-realistische Gewalt gegen menschenähnliche Charaktere. Dies kann sichtbare Einwirkungen beinhalten, jedoch im Allgemeinen ohne Blut. Andeutungen von Gewalt gegen Menschen, bei denen die eigentliche Gewalt nicht gezeigt wird, werden ebenfalls behandelt.
    - **Angst/Horror:** Stärkere Bedrohung, Schrecken oder detaillierte Beschreibungen von Verletzungen sowie längere Horrorszenen oder verstörende Bilder.
    - **Sprache:** Leichte Schimpfwörter und/oder anstößige Ausdrücke (ohne sexuelle Beleidigungen).
    - **Sex:** Sexuelle Anspielungen oder sexuelle Posen können vorkommen. Erotische Nacktheit oder nicht expliziter Geschlechtsverkehr.
    - **Glücksspiel:** Kann Elemente enthalten, die zum Glücksspiel anregen oder es lehren (Simulationen von Casinospielen usw.).
    - ***Implikation:*** Stellt einen deutlichen Schritt zu mehr Reife dar, einschließlich realistischerer Gewalt, anzüglicher Themen und leichter Kraftausdrücke.
    - ***Quellen:*** [Offizielle PEGI-Website](https://pegi.info/what-do-the-labels-mean), [Uswitch - Elternratgeber zu PEGI-Bewertungen](https://www.uswitch.com/broadband/studies/parents-guide-to-gaming/)
"en:pegi_16":
  content: |-
    - ***Was es ist:*** Der Inhalt ist für Personen ab 16 Jahren geeignet.
    - ***Hauptmerkmale:***
    - **Gewalt:** Darstellungen von Gewalt (oder sexuellen Handlungen), die ein Stadium erreichen, das dem im realen Leben zu erwartenden entspricht. Dies kann realistische Gewalt gegen menschliche Charaktere beinhalten, oft mit Darstellungen von Tod und Verletzungen. Blutige oder blutige Gewalt kann in Arcade-Spielen vorkommen.
    - **Sprache:** Explizitere Schimpfwörter, einschließlich sexueller Beleidigungen oder Blasphemie.
    - **Drogen:** Kann die Förderung von Tabak- oder Alkoholkonsum oder Darstellungen des Konsums illegaler Drogen beinhalten.
    - **Sex:** Erotische Nacktheit oder Geschlechtsverkehr ohne sichtbare Genitalien.
    - **Glücksspiel:** Kann Elemente enthalten, die zum Glücksspiel anregen oder es lehren.
    - ***Implikation:*** Inhalte dieser Stufe sind deutlich anspruchsvoller und beinhalten oft realistische und potenziell verstörende Themen.
    - ***Quellen:*** [Offizielle PEGI-Website](https://pegi.info/what-do-the-labels-mean), [Uswitch – Elternratgeber zu PEGI-Bewertungen](https://www.uswitch.com/broadband/studies/parents-guide-to-gaming/)
"en:pegi_18":
  content: |-
    - ***Was es ist:*** Inhalte sind nur für Erwachsene geeignet.
    - ***Hauptmerkmale:***
    - **Gewalt:** Wird angewendet, wenn die Gewalt als „grobe Gewalt“ eingestuft wird. Dies umfasst grausame Methoden, die zum Tod oder zu schweren Verletzungen führen, Folter, Enthauptung, Verstümmelung, grundloses Töten oder Gewalt gegen wehrlose Personen. Sexuelle Gewalt und Bedrohungen fallen ebenfalls darunter.
    - **Drogen:** Verherrlichende Darstellungen illegaler Drogen oder prominente Werbung für kontrollierte Substanzen.
    - **Sex:** Detaillierte oder explizite sexuelle Handlungen, einschließlich sichtbarer Genitalien.
    - **Glücksspiel:** Realistische Glücksspielsimulationen.
    - **Diskriminierung:** Kann Elemente enthalten, die Diskriminierung fördern oder lehren.
    - ***Implikation:*** Dies ist die höchste Altersfreigabe und kennzeichnet Inhalte, die aufgrund ihrer expliziten und potenziell verstörenden Natur ausschließlich für ein erwachsenes Publikum bestimmt sind.
    - ***Quellen:*** [Offizielle PEGI-Website](https://pegi.info/what-do-the-labels-mean), [Uswitch – Elternratgeber zu PEGI-Bewertungen](https://www.uswitch.com/broadband/studies/parents-guide-to-gaming/)
"en:pegi_violence":
  content: |-
    - ***Was es ist:*** Diese Beschreibung gibt an, dass das Spiel Gewaltdarstellungen enthält.
    - ***Schweregrade:***
    - **Mild/Cartoon (PEGI 3/7):** Sehr milde, nicht realistische Gewalt (z. B. Slapstick, cartoonhafte Verletzungen oder angedeutete Gewalt), oft gegen Fantasy-Charaktere gerichtet.
    - **Mittel (PEGI 12):** Grafischere oder realistischere Gewalt gegen Fantasy-Charaktere oder unrealistische Gewalt gegen menschenähnliche Charaktere (z. B. leichte Verletzungen, kein Blut).
    - **Stark (PEGI 16):** Realistische Gewalt gegen menschliche Charaktere, einschließlich Darstellungen von Tod und Verletzungen. Blutige oder blutige Gewalt kann in Arcade-Spielen vorkommen.
    - **Brutto (PEGI 18):** Grausame Methoden, Tod oder schwere Verletzungen herbeizuführen, einschließlich Folter, Enthauptung, Verstümmelung oder grundloser Gewalt gegen schutzlose/unschuldige Charaktere. Sexuelle Gewalt und Bedrohungen werden ebenfalls hier eingestuft.
    - ***Implikation:*** Je höher die zugehörige PEGI-Altersfreigabe, desto intensiver und realistischer ist die dargestellte Gewalt.
    - ***Quellen:*** [Offizielle PEGI-Website](https://pegi.info/what-do-the-labels-mean), [Games Rating Authority](https://gamesratingauthority.org.uk/RatingBoard/ratings)
"en:pegi_bad_language":
  content: |-
    - ***Was es ist:*** Diese Beschreibung kennzeichnet Spiele mit anstößiger Sprache oder Flüchen.
    - ***Schweregrade:***
    - **Mild (PEGI 12):** Leichte Flüche und/oder anstößige Sprache, jedoch keine sexuellen Ausdrücke (z. B. „verdammt“, „Hölle“, „Mist“).
    - **Stark (PEGI 16/18):** Sexuelle Ausdrücke, Blasphemie oder stark anstößige Sprache.
    - ***Auswirkung:*** Mit höherer PEGI-Altersfreigabe nehmen Häufigkeit und Intensität der anstößigen Sprache zu.
    - ***Quellen:*** [Offizielle PEGI-Website](https://pegi.info/what-do-the-labels-mean), [Games Rating Authority](https://gamesratingauthority.org.uk/RatingBoard/ratings)
"en:pegi_fear":
  content: |-
    - ***Was es ist:*** Diese Beschreibung weist darauf hin, dass das Spiel Elemente enthält, die beängstigend oder furchteinflößend sein können.
    - ***Schweregrade:***
    - **Beängstigend (PEGI 7):** Bilder oder Geräusche, die für kleine Kinder beängstigend oder furchteinflößend sein können (z. B. unheimliche Musik, gruselige Umgebungen, Schreie im Hintergrund). Enthält nicht unbedingt direkte Gewalt.
    - **Horror (PEGI 12+):** Stärkere Bedrohung, mehr Angst oder detaillierte Darstellungen von Verletzungen sowie längere Horrorszenen oder verstörende Bilder.
    - ***Auswirkung:*** Der Fokus liegt auf der psychologischen Wirkung und verstörenden Inhalten, nicht auf expliziter Gewalt.
    - ***Quellen:*** [Offizielle PEGI-Website](https://pegi.info/what-do-the-labels-mean), [Games Rating Authority](https://gamesratingauthority.org.uk/RatingBoard/ratings)
"en:pegi_gambling":
  content: |-
    - ***Was es ist:*** Diese Beschreibung kennzeichnet Spiele, die zum Glücksspiel anregen oder es lehren.
    - ***Umfang:*** Bezieht sich auf Simulationen traditioneller Glücksspiele, wie sie typischerweise in Casinos oder Spielhallen zu finden sind (z. B. Kartenspiele um Geld, Wetten auf Pferderennen).
    - ***Mindestalter:*** Diese Beschreibung erscheint nur bei Spielen mit einer Altersfreigabe von **PEGI 12, 16 oder 18**. Seit 2020 sind neu bewertete Spiele mit realistischen Glücksspielsimulationen immer PEGI 18.
    - ***Hinweis zu Lootboxen:*** Das Vorhandensein von „kostenpflichtigen Zufallsgegenständen“ (oft als Lootboxen bezeichnet) ist eine separate Inhaltsbeschreibung („In-Game-Käufe“) und kann auch in Spielen mit niedrigeren Altersfreigaben (z. B. PEGI 7) vorkommen.
    - ***Quellen:*** [Offizielle PEGI-Website](https://pegi.info/what-do-the-labels-mean), [Games Rating Authority](https://gamesratingauthority.org.uk/RatingBoard/ratings)
"en:pegi_sex":
  content: |-
    - ***Was es ist:*** Diese Beschreibung kennzeichnet das Vorhandensein sexueller Inhalte im Spiel.
    - ***Schweregrade:***
    - **Anspielungen/Posen (PEGI 12):** Sexuelle Posen oder Anspielungen.
    - **Erotische Nacktheit/Nicht-expliziter Geschlechtsverkehr (PEGI 16):** Darstellungen erotischer Nacktheit oder Geschlechtsverkehr ohne sichtbare Genitalien.
    - **Explizite sexuelle Handlungen (PEGI 18):** Detaillierte oder explizite sexuelle Handlungen, einschließlich sichtbarer Genitalien. Sexuelle Gewalt und Bedrohungen fallen ebenfalls in diese Kategorie.
    - ***Auswirkungen:*** Der Grad der Explizitheit und Detailgenauigkeit der sexuellen Inhalte nimmt mit höheren PEGI-Altersfreigaben zu.
    - ***Quellen:*** [Offizielle PEGI-Website](https://pegi.info/what-do-the-labels-mean), [Games Rating Authority](https://gamesratingauthority.org.uk/RatingBoard/ratings)
"en:pegi_drugs":
  content: |-
    - ***Was es ist:*** Diese Beschreibung kennzeichnet Spiele, die den Konsum illegaler Drogen, Alkohol oder Tabak thematisieren oder darstellen.
    - ***Schweregrade:***
    - **Anstiftung/Darstellung des Konsums (PEGI 16):** Anstiftung zum Tabak- oder Alkoholkonsum (z. B. erhält eine Spielfigur einen Vorteil) oder Darstellung des Konsums illegaler Drogen.
    - **Verherrlichung/Werbung (PEGI 18):** Verherrlichende Darstellung illegaler Drogen oder prominente Werbung für kontrollierte Substanzen.
    - ***Mindestbewertung:*** Diese Beschreibung findet sich nur bei Spielen mit einer Bewertung von **PEGI 16 oder PEGI 18**.
    - ***Quellen:*** [Offizielle PEGI-Website](https://pegi.info/what-do-the-labels-mean), [Games Rating Authority](https://gamesratingauthority.org.uk/RatingBoard/ratings)
"en:pegi_discrimination":
  content: |-
    - ***Was es ist:*** Diese Beschreibung weist darauf hin, dass das Spiel Darstellungen ethnischer, religiöser, nationalistischer oder anderer Stereotypen enthält, die wahrscheinlich Hass schüren.
    - ***Kontext:*** Diese Einstufung wird vergeben, wenn das Spiel Diskriminierung von Gruppen aufgrund ihrer Herkunft, Religion, Nationalität, ihres Geschlechts, ihrer sexuellen Orientierung oder anderer Merkmale fördert oder verherrlicht.
    - ***Mindestbewertung:*** Diese Beschreibung erscheint typischerweise bei Spielen mit der Bewertung **PEGI 18**, da die Inhalte sehr schwerwiegend sind.
    - ***Quellen:*** [Offizielle PEGI-Website](https://pegi.info/what-do-the-labels-mean), [Games Rating Authority](https://gamesratingauthority.org.uk/RatingBoard/ratings)
"en:pegi_in_game_purchases":
  content: |-
    - ***Was es ist:*** Diese Beschreibung zeigt an, dass das Spiel optionale digitale Käufe mit echtem Geld anbietet.
    - ***Umfang:*** Beinhaltet verschiedene Arten von In-Game-Käufen:
    - **Kosmetische Gegenstände:** Skins, Emotes, visuelle Verbesserungen.
    - **Spielvorteile:** Power-ups, Währung, Booster.
    - **Erweiterungen/DLC:** Zusätzliche Inhalte oder Story.
    - **Kostenpflichtige Zufallsgegenstände (Lootboxen):** Hierbei wissen die Spieler vor dem Kauf nicht genau, was sie erhalten (z. B. Kartenpakete, Gegenstandskisten).
    - ***Hinweis:*** Diese Beschreibung ist **keine** Altersfreigabe, sondern ein Informationssymbol. Es kann in Spielen mit jeder PEGI-Altersfreigabe vorkommen, einschließlich PEGI 3.
    - ***Bedenken (insbesondere für Kinder):*** Potenzielle Gefahr übermäßiger Ausgaben, Förderung von glücksspielähnlichem Verhalten durch zufällig generierte Gegenstände und Kaufzwang, um im Spiel voranzukommen.
    - ***Quellen:*** [Offizielle PEGI-Website](https://pegi.info/what-do-the-labels-mean), [Elternbereich – PEGI-Bewertungen verstehen](https://parentzone.org.uk/article/pegi-games-ratings)
