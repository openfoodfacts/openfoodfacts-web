"en:corn-syrup":
  content: |-
    - ***Co to je:*** Sirup vyrobený z kukuřičného škrobu, často používaný ke slazení a zahušťování zpracovaných potravin.
    - ***Typy:*** Světlé (čiré a jemně sladké) a tmavé (s karamelovou příchutí a méně sladké).
    - ***Obavy:***
    - Vysoký obsah fruktózy, zejména ve formě kukuřičného sirupu s vysokým obsahem fruktózy (HFCS).
    - Souvisí s potenciálními zdravotními problémy, jako je přibírání na váze, metabolické poruchy a problémy s játry.
    – Může přispívat k "prázdným kaloriím" s nízkou nutriční hodnotou.
    - Kukuřice jako plodina je velmi náročná na spotřebu vody, což vyvolává obavy z nedostatku vody
    - Zdroje: [WHO](https://www.who.int/news/item/04-03-2015-who-calls-on-countries-to-reduce-sugars-intake-among-adults-and-children), [WWF](https://www.worldwildlife.org/magazine/issues/summer-2024/articles/how-the-us-s-number-one-crop-is-putting-grasslands-at-risk)
"en:glucose-syrup":
  content: |-
    - ***Co to je:*** Silná, sladká kapalina vyrobená z kukuřičného škrobu nebo pšeničného škrobu.
    - ***Proč je použit:*** Zabraňuje krystalizaci cukru v cukrovinkách, udržuje pečené zboží vlhké a přidává sladkost.
    - ***Zdravotní problémy:*** Vysoce zpracované, nízké množství živin a může přispět k přírůstku hmotnosti a dalším zdravotním problémům.
    - ***Hledejte:*** "glukosový sirup", "kukuřičný sirup" nebo "cukrovinková glukóza" v seznamech přísad.
    - ***Obavy:***
    - Glukosový sirup obvykle má vysoký obsah fruktosy, který je spojen s potenciálními zdravotními problémy, jako je přírůstek hmotnosti, metabolické poruchy a problémy s játry.
    - Může přispívat k "prázdným kaloriím" s malou výživovou hodnotou.
    - Zdroje: [WHO](https://www.who.int/news/item/04-03-2015-who-calls-on-countries-to-reduce-sugars-intake-among-adults-and-children)
