"en:aqua":
  content: |-
    - ***Wat het is: Ook wel bekend als water, is het het meest voorkomende ingrediënt in cosmetica. Het fungeert als oplosmiddel, vervoert andere ingrediënten en draagt bij aan de textuur van het product.
    - ***Soorten: Gezuiverd water, gedeïoniseerd water, gedestilleerd water. De kwaliteit van het gebruikte water is belangrijk om verontreinigingen te voorkomen.
    - ***Aandachtspunten:
    - Hoewel water over het algemeen veilig is, kan het bijdragen aan de groei van micro-organismen in producten als er geen goede conserveringsmethoden worden gebruikt.
    - De milieu-impact van watergebruik bij de productie, vooral in regio's met waterschaarste, is een groeiende zorg.
