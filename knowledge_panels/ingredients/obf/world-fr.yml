"en:aqua":
  content: |-
    - ***Qu'est-ce que c'est ? : Aussi appelée eau, c'est l'ingrédient le plus courant des cosmétiques. Elle sert de solvant, transporte d'autres ingrédients et contribue à la texture du produit.
    - ***Types : Eau purifiée, eau déminéralisée, eau distillée. La qualité de l'eau utilisée est importante pour éviter l'introduction de contaminants.
    - ***Préoccupations :
    - Bien que généralement sans danger, l'eau peut favoriser la prolifération de micro-organismes dans les produits si des méthodes de conservation appropriées ne sont pas utilisées.
    - L'impact environnemental de la consommation d'eau dans la fabrication, en particulier dans les régions où l'eau est rare, est une préoccupation croissante.
