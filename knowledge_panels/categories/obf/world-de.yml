"en:sunscreen":
  content: |-
    • ***Was es ist: Sonnencremes, auch als Sonnenschutzmittel bekannt, sind topische Produkte, die die Haut vor den schädlichen Auswirkungen der ultravioletten (UV-)Strahlung der Sonne schützen sollen.  Sie enthalten spezielle Inhaltsstoffe, die UV-Strahlen entweder absorbieren oder reflektieren und so verhindern, dass sie in die Haut eindringen und Schäden verursachen.
    • ***Typen: Sonnencremes gibt es in verschiedenen Formen, darunter Lotionen, Sprays, Stifte und Gele.  Sie werden auch nach ihrem Lichtschutzfaktor (LSF) klassifiziert, der angibt, wie lange es dauert, bis UVB-Strahlen die Haut röten, wenn man das Produkt verwendet, im Vergleich zu der Zeit, die es ohne Schutz dauern würde.  Breitspektrum-Sonnenschutzmittel schützen sowohl vor UVA- als auch vor UVB-Strahlen.  Physikalische Sonnenschutzmittel (mineralische Sonnenschutzmittel) enthalten mineralische Bestandteile wie Zinkoxid und Titandioxid, die sich auf die Haut legen und UV-Strahlen reflektieren. Chemische Sonnenschutzmittel enthalten Chemikalien, die UV-Strahlen absorbieren und sie in Wärme umwandeln, die dann von der Haut abgegeben wird.
    • ***Bedenken:
    • **Chemische Filter:** Einige chemische Sonnenschutzfilter haben Bedenken hinsichtlich möglicher Hormonstörungen und Hautreizungen aufgeworfen.  Die Forschung ist noch nicht abgeschlossen, um die langfristigen Auswirkungen dieser Chemikalien vollständig zu verstehen.  Einige spezifische Chemikalien wurden auch an bestimmten Orten wegen ihrer Umweltauswirkungen auf Korallenriffe verboten.
    mineralischen Sonnenschutzmitteln. Obwohl sie im Allgemeinen als sicher gelten, deuten einige Studien auf mögliche Risiken im Zusammenhang mit ihrem Eindringen in die Haut hin.  Die Vorschriften für die Verwendung von Nanopartikeln in Sonnenschutzmitteln sind unterschiedlich.
    • **Auswirkungen auf die Umwelt:** Die Inhaltsstoffe einiger Sonnenschutzmittel, insbesondere chemische Filter, können aquatische Ökosysteme, insbesondere Korallenriffe, schädigen.  Dies hat zur Entwicklung von „riffsicheren“ oder „rifffreundlichen“ Sonnenschutzmitteln geführt, die diese schädlichen Chemikalien vermeiden.
    • **Wirksamkeit:** Die Wirksamkeit von Sonnenschutzmitteln hängt von der richtigen Anwendung ab.  Wenn man zu wenig Sonnenschutzmittel verwendet oder es nicht häufig genug aufträgt, insbesondere nach dem Schwimmen oder Schwitzen, kann die Schutzwirkung erheblich verringert werden.
    • **Allergische Reaktionen:** Bei einigen Personen kann es zu allergischen Reaktionen oder Hautreizungen durch bestimmte Inhaltsstoffe von Sonnenschutzmitteln kommen.  Insbesondere bei empfindlicher Haut wird ein Patch-Test vor der allgemeinen Anwendung empfohlen.
    • **Falsches Sicherheitsgefühl:** Sonnenschutzmittel sollten nicht als einzige Methode des Sonnenschutzes verwendet werden.  Es ist wichtig, auch den Schatten aufzusuchen, schützende Kleidung zu tragen und die Sonnenexposition während der Hauptverkehrszeiten zu begrenzen.
