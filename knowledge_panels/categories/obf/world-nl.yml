"en:sunscreen":
  content: |-
    - Wat het is: zonnecrèmes: Zonnecrèmes, ook bekend als zonnefilters, zijn lokale producten die zijn ontworpen om de huid te beschermen tegen de schadelijke effecten van de ultraviolette (UV) straling door de zon.  Ze bevatten specifieke ingrediënten die UV-stralen absorberen of weerkaatsen, waardoor ze de huid niet kunnen binnendringen en schade kunnen veroorzaken.
    - ***Soorten: Zonnebrandcrèmes zijn er in verschillende vormen, waaronder lotions, sprays, sticks en gels.  Ze worden ook geclassificeerd aan de hand van hun zonbeschermingsfactor (SPF), die aangeeft hoe lang het duurt voordat UVB-stralen de huid rood kleuren als je het product gebruikt, vergeleken met hoe lang dit zou duren zonder enige bescherming.  Breedspectrum zonnefilters beschermen tegen zowel UVA- als UVB-stralen.  Fysische zonnefilters (minerale zonnefilters) bevatten minerale ingrediënten zoals zinkoxide en titaniumdioxide die op de huid achterblijven en UV-stralen weerkaatsen. Chemische zonnefilters bevatten chemische stoffen die UV-stralen absorberen en omzetten in warmte, die vervolgens door de huid wordt afgegeven.
    - ***Opmerkingen:
    - Chemische filters:** Sommige chemische zonnefilters hebben geleid tot twijfels over mogelijke verstoring van de hormoonhuishouding en huidirritatie.  Er wordt nog onderzoek gedaan naar de langetermijneffecten van deze chemische stoffen.  Sommige specifieke chemische stoffen zijn ook op bepaalde locaties verboden vanwege hun milieueffecten op koraalriffen.
    - Nanodeeltjes:** Er is bezorgdheid over het gebruik van nanodeeltjes in minerale zonnefilters. Hoewel ze over het algemeen als veilig worden beschouwd, suggereren sommige onderzoeken potentiële risico's in verband met hun penetratie in de huid.  De regelgeving met betrekking tot het gebruik van nanodeeltjes in zonnebrandcrèmes varieert.
    - De ingrediënten in sommige zonnefilters, met name chemische filters, kunnen schadelijk zijn voor aquatische ecosystemen, met name koraalriffen.  Dit heeft geleid tot de ontwikkeling van “rifveilige” of “rifvriendelijke” zonnefilters die deze schadelijke chemicaliën vermijden.
    - ** Doeltreffendheid:** De doeltreffendheid van een zonnecrème hangt af van de manier waarop u hem aanbrengt.  Als u te weinig zonnecrème gebruikt of deze niet vaak genoeg opnieuw aanbrengt, vooral na het zwemmen of zweten, kan dit de beschermende werking aanzienlijk verminderen.
    - Allergische reacties:** Sommige mensen kunnen allergische reacties of huidirritatie ondervinden van bepaalde bestanddelen van een zonnecrème.  Het wordt aanbevolen om vóór gebruik een patchtest uit te voeren, vooral bij een gevoelige huid.
    - Een vals gevoel van veiligheid:** Zonnebrandcrème mag niet de enige manier zijn om je tegen de zon te beschermen.  Het is belangrijk om ook de schaduw op te zoeken, beschermende kleding te dragen en blootstelling aan de zon tijdens piekuren te beperken.
    - ***Leer meer via: https://en.wikipedia.org/wiki/Sunscreen
