"en:washing-machines":
  content: |-
    - ***Was es ist: Eine Waschmaschine ist ein Haushaltsgerät, das zum Waschen von Wäsche
    wie Kleidung, Handtüchern und Bettwäsche entwickelt wurde. Sie automatisiert den
    Prozess der Reinigung von Textilien unter Verwendung von Wasser, Waschmittel und
    mechanischer Einwirkung, oft gefolgt von einem Schleudergang, um überschüssiges
    Wasser zu entfernen.

    - ***Typen: Waschmaschinen gibt es in verschiedenen Konfigurationen:
    - **Top-Loader (Agitator):** Traditionelles Design, bei dem die Wäsche von oben geladen
    wird und ein Agitator in der Mitte wirbelt, um die Kleidung zu reinigen. Im Allgemeinen
    weniger teuer und mit schnelleren Waschzyklen.
    - **Top-Loader (Impeller):** Ähnliches Top-Loading-Design, verwendet jedoch einen
    flachen Impeller am Boden der Trommel anstelle eines zentralen Agitators, was mehr
    Kapazität und eine schonendere Reinigung ermöglicht.
    - **Front-Loader:** Die Wäsche wird von vorne geladen und die Trommel bewegt die
    Kleidung im Fallprinzip (tumble), um sie zu reinigen. Typischerweise energie- und
    wassereffizienter, bietet mehr Waschzyklen und ist schonender zur Kleidung. Sie haben
    oft höhere Schleuderdrehzahlen, was zu kürzeren Trocknungszeiten führt.
    - **Kompakt/Tragbar:** Kleinere Versionen, die für Wohnungen oder kleine Räume
    geeignet sind; einige davon sind tragbar und können an ein Waschbecken
    angeschlossen werden.
    - **Waschtrockner-Kombi:** Ein einzelnes Gerät, das sowohl Wasch- als auch
    Trocknungsfunktionen ausführt. Platzsparend, kann aber längere kombinierte Zyklen
    haben.

    Wichtige Merkmale und Technologien variieren:
    - **Kapazität:** Gemessen in Kilogramm oder Kubikfuß, gibt an, wie viel Wäsche pro
    Zyklus gewaschen werden kann.
    - **Energieeffizienz:** Angezeigt durch Energiebewertungen (z. B. A+++ in Europa), die
    zeigen, wie viel Strom und Wasser die Maschine verbraucht.
    - **Schleuderdrehzahl:** Gemessen in Umdrehungen pro Minute (RPM), beeinflusst, wie
    viel Wasser während des Schleudergangs aus der Kleidung extrahiert wird.
    - **Waschprogramme:** Spezialisierte Zyklen für verschiedene Stoffarten (z. B.
    Feinwäsche, Baumwolle, Synthetik) und Verschmutzungsgrade.
    - **Smart Features:** Konnektivität zu Apps für Fernsteuerung, Zyklus-Individualisierung
    und Fehlerbehebung.

    - ***Bedenken:
    - **Energie- und Wasserverbrauch:** Ältere Modelle oder weniger effiziente Neumodelle
    können erhebliche Mengen an Wasser und Strom verbrauchen, was sich auf die
    Nebenkostenabrechnung und die Umwelt auswirkt. Die Wahl eines energieeffizienten
    Modells ist ein häufiges Anliegen.
    - **Geräuschpegel:** Einige Waschmaschinen können, besonders während des
    Schleudergangs, sehr laut sein, was ein Problem für Wohnungsbewohner oder
    Personen mit offenen Wohnbereichen sein kann.
    - **Vibration:** Hohe Schleuderdrehzahlen können erhebliche Vibrationen verursachen,
    insbesondere bei ungleichmäßiger Beladung, was potenziell die Langlebigkeit der
    Maschine beeinträchtigt und Störungen verursacht.
    - **Wartung und Langlebigkeit:** Wie alle Haushaltsgeräte erfordern Waschmaschinen
    Wartung (z. B. Reinigung der Waschmittelschubladen, Trommelreinigungsprogramme),
    um Schimmel und Gerüche zu verhindern und eine längere Lebensdauer zu
    gewährleisten. Reparaturen können kostspielig sein.
    - **Kosten:** Der ursprüngliche Kaufpreis kann stark variieren, von budgetfreundlichen
    Optionen bis hin zu High-End-Modellen mit fortschrittlichen Funktionen.
    - **Platzbedarf:** Waschmaschinen benötigen ausreichend Platz, einschließlich
    Anschlüsse für Wasserversorgung und Abwasser sowie eine ordnungsgemäße
    Belüftung. Dies ist besonders relevant für das städtische Wohnen, wo der Platz
    begrenzt sein kann.
    - **Verwendung von Waschmitteln und Zusatzstoffen:** Art und Menge des verwendeten
    Waschmittels können die Reinigungsleistung und den Zustand der Maschine
    beeinflussen (z. B. übermäßige Schaumbildung). Bedenken hinsichtlich der
    Umweltauswirkungen von Waschmitteln bestehen ebenfalls.
    - **Freisetzung von Mikroplastik:** Das Waschen von synthetischer Kleidung kann
    Mikroplastikfasern in das Abwasser freisetzen, was zur Umweltverschmutzung beiträgt
    – ein wachsendes Bedenken in der Textilindustrie.
