"en:1-unprocessed-or-minimally-processed-foods":
  content: |-
    - ***Qu'est-ce que c'est ?*** Les aliments non transformés (ou naturels) sont les parties comestibles des plantes (graines, fruits, feuilles, tiges, racines) ou des animaux (muscles, abats, œufs, lait), ainsi que les champignons, les algues et l'eau, après séparation de leur milieu naturel.
    - ***Aliments peu transformés ?*** Les aliments naturels sont des aliments transformés par divers procédés, notamment l'élimination des parties non comestibles ou indésirables, le séchage, le broyage, le fractionnement, la filtration, la torréfaction, la cuisson, la fermentation non alcoolique, la pasteurisation, la réfrigération, la congélation, la mise en contenants et le conditionnement sous vide. Ces procédés visent à préserver les aliments naturels, à les rendre aptes au stockage, sûrs, comestibles ou plus agréables à consommer.
    - ***Utilisation ?*** De nombreux aliments non transformés ou peu transformés sont préparés et cuisinés à la maison ou dans les restaurants, souvent en association avec des ingrédients culinaires transformés, pour composer des plats ou des repas.
    - ***Plus d'informations :*** [Classification NOVA sur Open Food Facts](https://world.openfoodfacts.org/nova)
"en:2-processed-culinary-ingredients":
  content: |-
    - ***Description :*** Les ingrédients culinaires transformés, tels que les huiles, le beurre, le sucre et le sel, sont des substances dérivées d’aliments du groupe 1 ou de la nature, obtenues par des procédés incluant le pressage, le raffinage, le broyage, la mouture et le séchage.
    - ***Utilisation :*** Ces procédés visent à fabriquer des produits durables, adaptés à une utilisation domestique et professionnelle pour la préparation, l’assaisonnement et la cuisson d’aliments du groupe 1, ainsi que pour la confection de plats et de repas maison variés et savoureux, tels que des ragoûts, des soupes et des bouillons, des salades, du pain, des conserves, des boissons et des desserts.
    - ***Utilisation :*** Ils ne sont pas destinés à être consommés seuls et sont généralement utilisés en combinaison avec des aliments du groupe 1 pour la préparation de boissons, de plats et de repas frais.
    - ***Plus d’informations :*** [Classification NOVA sur Open Food Facts](https://world.openfoodfacts.org/nova)
"en:3-processed-foods":
  content: |-
    - ***Description :*** Les aliments transformés, tels que les légumes en conserve, le poisson en conserve, les fruits au sirop, les fromages et les pains frais, sont essentiellement obtenus par l’ajout de sel, d’huile, de sucre ou d’autres substances du groupe 2 aux aliments du groupe 1.
    - ***Méthodes de transformation :*** Les procédés comprennent diverses méthodes de conservation ou de cuisson et, dans le cas du pain et du fromage, la fermentation non alcoolique. La plupart des aliments transformés contiennent deux ou trois ingrédients et sont reconnaissables comme des versions modifiées des aliments du groupe 1.
    - ***Objectif :*** L’objectif de la transformation est d’accroître la durée de conservation des aliments du groupe 1 ou de modifier ou d’améliorer leurs qualités organoleptiques.
    - ***Utilisation :*** Ils se consomment tels quels ou, le plus souvent, en association avec d’autres aliments.
    - ***Plus d’informations :*** [Classification NOVA sur Open Food Facts](https://world.openfoodfacts.org/nova)
"en:4-ultra-processed-food-and-drink-products":
  content: |-
    - ***Qu’est-ce que c’est :***
    Les aliments ultra-transformés, tels que les boissons gazeuses, les snacks sucrés ou salés emballés, les produits carnés reconstitués et les plats surgelés préparés, ne sont pas des aliments simplement modifiés mais des formulations composées majoritairement ou entièrement de substances dérivées d’aliments et d’additifs, avec peu ou pas d’aliments du Groupe 1 intacts.
    - ***Ingrédients :***
    Les ingrédients de ces formulations incluent généralement ceux utilisés dans les aliments transformés, tels que les sucres, huiles, graisses ou sel. Mais les produits ultra-transformés contiennent également d’autres sources d’énergie et de nutriments qui ne sont pas habituellement utilisés en cuisine. Certains de ces ingrédients sont directement extraits d’aliments, comme la caséine, le lactose, le lactosérum (whey) et le gluten.
    - ***Transformation avancée :***
    Beaucoup sont issus de transformations supplémentaires des constituants alimentaires, comme les huiles hydrogénées ou estérifiées, les protéines hydrolysées, l’isolat de protéine de soja, la maltodextrine, le sucre inverti et le sirop de maïs à haute teneur en fructose.
    - ***Additifs :***
    Les additifs des aliments ultra-transformés incluent certains également utilisés dans les aliments transformés, comme les conservateurs, antioxydants et stabilisants. Certaines classes d’additifs ne se trouvent que dans les produits ultra-transformés et sont utilisées pour imiter ou renforcer les qualités sensorielles des aliments, ou pour masquer des aspects peu agréables du produit final. Ces additifs incluent des colorants et autres pigments, stabilisateurs de couleur ; arômes, exhausteurs de goût, édulcorants non sucrés ; et des aides technologiques telles que les agents de carbonatation, de fermeté, de gonflement ou anti-gonflement, anti-mousse, anti-agglomérants et agents de glaçage, émulsifiants, séquestrants et humectants.

    - ***Transformation complexe :***
    Une multitude de séquences de procédés est utilisée pour combiner les nombreux ingrédients et créer le produit final (d’où le terme « ultra-transformé »). Ces procédés incluent plusieurs techniques sans équivalent domestique, comme l’hydrogénation et l’hydrolyse, l’extrusion et le moulage, ainsi que la pré-préparation pour friture.

    - ***Objectif :***
    Le but global de l’ultra-transformation est de créer des produits alimentaires de marque, pratiques (durables, prêts à consommer), attractifs (hyper-appétents) et très rentables (ingrédients peu coûteux), conçus pour supplanter tous les autres groupes alimentaires. Les produits ultra-transformés sont généralement emballés de manière attrayante et intensivement commercialisés.

    - ***Plus d’informations :*** [NOVA classification on Open Food Facts](https://world.openfoodfacts.org/nova)
