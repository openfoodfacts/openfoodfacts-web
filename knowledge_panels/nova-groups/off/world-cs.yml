"en:1-unprocessed-or-minimally-processed-foods":
  content: |-
    - ***Co to je:*** Nezpracované (nebo přírodní) potraviny jsou jedlé části rostlin (semena, plody, listy, stonky, kořeny) nebo zvířat (svalovina, droby, vejce, mléko) a také houby, řasy a voda po oddělení od přírody.
    - ***Minimálně zpracované potraviny:*** Přírodní potraviny upravené procesy, které zahrnují odstranění nepoživatelných nebo nežádoucích částí a sušení, drcení, mletí, frakcionaci, filtrování, pražení, vaření, nealkoholickou fermentaci, pasterizaci, chlazení, mrazení, plnění do nádob a vakuové balení. Tyto procesy jsou navrženy tak, aby přírodní potraviny byly konzervovány, aby byly vhodné pro skladování, bezpečné, jedlé nebo příjemnější ke konzumaci.
    - ***Použití:*** Mnoho nezpracovaných nebo minimálně zpracovaných potravin se připravuje a vaří doma nebo v restauračních kuchyních v kombinaci se zpracovanými kulinářskými ingrediencemi jako pokrmy nebo jídla.
    - ***Více informací:*** [Klasifikace NOVA na Open Food Facts](https://world.openfoodfacts.org/nova)
"en:2-processed-culinary-ingredients":
  content: |-
    - ***Co to je:*** Zpracované kulinářské přísady, jako jsou oleje, máslo, cukr a sůl, jsou látky získané z potravin skupiny 1 nebo z přírody procesy, které zahrnují lisování, rafinaci, mletí, mletí a sušení.
    - ***Účel:*** Účelem takových procesů je vytvářet trvanlivé produkty, které jsou vhodné pro použití v domácích a restauračních kuchyních k přípravě, kořenění a vaření potravin skupiny 1 a k přípravě s nimi různých a chutných ručně vyrobených jídel a pokrmů, jako jsou dušená jídla, polévky a vývary, saláty, chlebíčky, konzervy, nápoje a dezerty.
    - ***Použití:*** Nejsou určeny k samostatné konzumaci a obvykle se používají v kombinaci s potravinami skupiny 1 k přípravě čerstvě připravených nápojů, jídel a pokrmů.
    - ***Více informací:*** [Klasifikace NOVA na Open Food Facts](https://world.openfoodfacts.org/nova)
"en:3-processed-foods":
  content: |-
    - ***Co to je:*** Zpracované potraviny, jako je balená zelenina, rybí konzervy, ovoce v sirupu, sýry a čerstvě upečený chléb, se vyrábějí v podstatě přidáním soli, oleje, cukru nebo jiných látek ze skupiny 2 do potravin skupiny 1.
    - ***Metody zpracování:*** Procesy zahrnují různé metody konzervace nebo vaření a v případě chleba a sýrů nealkoholické kvašení. Většina zpracovaných potravin má dvě nebo tři složky a lze je rozpoznat jako upravené verze potravin skupiny 1.
    - ***Účel:*** Účelem zpracování je zvýšit trvanlivost potravin skupiny 1 nebo upravit či zlepšit jejich senzorické vlastnosti.
    - ***Použití:*** Jsou jedlé samotné nebo častěji v kombinaci s jinými potravinami.
    - ***Více informací:*** [Klasifikace NOVA na Open Food Facts](https://world.openfoodfacts.org/nova)
"en:4-ultra-processed-food-and-drink-products":
  content: |-
    - ***Co to je:*** Ultra-zpracované potraviny, jako jsou nealkoholické nápoje, sladké nebo slané balené svačiny, rekonstituované masné výrobky a předpřipravené mražené pokrmy, nejsou modifikované potraviny, ale směsi vyrobené převážně nebo výhradně z látek odvozených z potravin a přídatných látek, s malým nebo žádným obsahem intaktních potravin skupiny 1.
    - ***Složení:*** Složení těchto směsí obvykle zahrnuje ty, které se používají i ve zpracovaných potravinách, jako jsou cukry, oleje, tuky nebo sůl. Ultra-zpracované výrobky však obsahují i ​​další zdroje energie a živin, které se běžně nepoužívají v kulinářských přípravách. Některé z nich jsou přímo extrahovány z potravin, jako je kasein, laktóza, syrovátka a lepek.
    - ***Pokročilé zpracování:*** Mnoho z nich pochází z dalšího zpracování složek potravin, jako jsou hydrogenované nebo interesterifikované oleje, hydrolyzované bílkoviny, izolát sójových bílkovin, maltodextrin, invertní cukr a kukuřičný sirup s vysokým obsahem fruktózy.
    - ***Přídatné látky:*** Mezi přídatné látky v ultra-zpracovaných potravinách patří některé, které se používají i ve zpracovaných potravinách, jako jsou konzervanty, antioxidanty a stabilizátory. Mezi třídy přísad, které se nacházejí pouze v ultrazpracovaných produktech, patří ty, které se používají k napodobení nebo vylepšení senzorických vlastností potravin nebo k maskování nechutných aspektů konečného produktu. Mezi tyto přísady patří barviva, stabilizátory barev; aromata, zvýrazňovače chuti, necukrová sladidla; a pomocné látky při zpracování, jako jsou syticí, zpevňující, objemové a protiplísňové látky, odpěňovací, protispékavé a lešticí látky, emulgátory, sekvestranty a zvlhčovadla.
    - ***Komplexní zpracování:*** Ke kombinování obvykle mnoha ingrediencí a k vytvoření konečného produktu (odtud „ultrazpracovaný“) se používá řada sekvencí procesů. Mezi tyto procesy patří několik procesů, které nemají domácí ekvivalenty, jako je hydrogenace a hydrolyzace, extruze a tvarování a předzpracování pro smažení.
    - ***Účel:*** Celkovým účelem ultrazpracování je vytvořit značkové, pohodlné (trvanlivé, připravené ke konzumaci), atraktivní (hyperchutné) a vysoce ziskové (levné ingredience) potravinářské výrobky určené k náhradě všech ostatních skupin potravin. Ultrazpracované potravinářské výrobky jsou obvykle atraktivně baleny a intenzivně uváděny na trh.
    - ***Více informací:*** [Klasifikace NOVA na Open Food Facts](https://world.openfoodfacts.org/nova)
